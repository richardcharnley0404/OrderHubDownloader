appId: com.orderhub.downloader
productName: OrderHub Downloader
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: assets

# Ship the ONNX orientation model alongside the app.
# asarUnpack is mandatory: onnxruntime-node loads the model by filesystem
# path and cannot read from inside an asar archive.
extraResources:
  - from: resources/models
    to: models
asarUnpack:
  - resources/models/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.ico
  sign: scripts/sign.js

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: generic
  url: https://your-s3-bucket.s3.amazonaws.com/ohd/
